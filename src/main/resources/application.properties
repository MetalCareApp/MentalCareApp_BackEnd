spring.application.name=remind
spring.profiles.include=s3

# [1] Data Source (RDS)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://database-test.cvmigocosl4p.ap-northeast-2.rds.amazonaws.com:3306/remind?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&useSSL=false
# DB Username: ????? admin, ????? root
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}

# [Hikari CP]
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# [2] JPA & Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# [3] Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

# [4] JWT Security
jwt.secret=${JWT_SECRET:remind_secret_key_very_long_and_secure_2026_03_26_for_safety}

# [5] AI Servers
ai.chat.url=${AI_SERVER_URL}
ai.report.url=${AI_REPORT_URL}

# [6] CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

