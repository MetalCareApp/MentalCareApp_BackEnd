spring.application.name=remind

# MySQL 설정
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/remind?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}

# JPA 설정 (계속)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Google Login 설정 (Spring Security OAuth2 Client)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

# JWT 설정
jwt.secret=${JWT_SECRET:remind_secret_key_for_local_development_2026}

# AI Chatbot 설정
chatbot.api.url=${CHATBOT_API_URL:http://localhost:5000/api/chat}
chatbot.api.key=${CHATBOT_API_KEY:local_test_key}

# CORS 설정 (프론트엔드 연동 대비)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}


